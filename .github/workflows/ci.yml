name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.22.0"
  JAVA_VERSION: "17"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. ANALYZE & FORMAT
  #    Runs on every push/PR. Fast feedback — no emulators needed.
  # ─────────────────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Check formatting
        run: melos format

      - name: Analyze all packages
        run: melos analyze

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. TEST — DOMAIN (pure Dart, runs on ubuntu, fastest job)
  # ─────────────────────────────────────────────────────────────────────────────
  test-domain:
    name: Test · domain
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run domain tests
        run: melos test:domain

      - name: Upload domain coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-domain
          path: packages/domain/coverage/lcov.info

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. TEST — DATA (SQLite / drift, runs on ubuntu)
  # ─────────────────────────────────────────────────────────────────────────────
  test-data:
    name: Test · data
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run data tests
        run: melos test:data

      - name: Upload data coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: packages/data/coverage/lcov.info

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. TEST — GEOFENCING (platform-channel mocks, ubuntu)
  # ─────────────────────────────────────────────────────────────────────────────
  test-geofencing:
    name: Test · geofencing
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run geofencing tests
        run: melos test:geofencing

      - name: Upload geofencing coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-geofencing
          path: packages/geofencing/coverage/lcov.info

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. COVERAGE REPORT (merges all package lcov files)
  # ─────────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: [test-domain, test-data, test-geofencing]
    steps:
      - uses: actions/checkout@v4

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Merge lcov reports
        run: |
          lcov \
            --add-tracefile coverage/lcov.info \
            --output-file coverage/merged.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/merged.info
          fail_ci_if_error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. BUILD — iOS (macOS runner, no code signing)
  #    Only runs on pushes to main/develop, not on every PR to save runner minutes.
  # ─────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build · iOS
    runs-on: macos-14
    needs: [test-domain, test-data, test-geofencing]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build iOS (no codesign)
        run: melos build:ios

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: apps/mobile/build/ios/archive/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. BUILD — Android
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build · Android
    runs-on: ubuntu-latest
    needs: [test-domain, test-data, test-geofencing]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build Android App Bundle
        run: melos build:android

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: apps/mobile/build/app/outputs/bundle/release/
          retention-days: 7
