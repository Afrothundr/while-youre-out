name: whileyoureout

packages:
  - apps/*
  - packages/*

command:
  version:
    # Generate changelogs for each package
    workspaceChangelog: true
  bootstrap:
    # Ensure all packages are linked after melos bootstrap
    runPubGetInParallel: true
    environment:
      sdk: ">=3.2.0 <4.0.0"
      flutter: ">=3.16.0"
    dependencies:
      very_good_analysis: ^5.1.0
    dev_dependencies:
      melos: ^6.0.0

scripts:
  # ── Analysis ────────────────────────────────────────────────────────────────

  analyze:
    exec: flutter analyze --fatal-infos
    description: Run flutter analyze across all packages.

  format:
    exec: dart format . --set-exit-if-changed
    description: Check formatting across all packages.

  format:fix:
    exec: dart format .
    description: Auto-fix formatting across all packages.

  # ── Testing ─────────────────────────────────────────────────────────────────

  test:
    run: flutter test --coverage
    exec:
      failFast: true
    description: Run all unit and widget tests across all packages.
    packageFilters:
      dirExists: test

  test:domain:
    exec: flutter test --coverage
    description: Run tests for the domain package only.
    packageFilters:
      scope: "domain"

  test:data:
    exec: flutter test --coverage
    description: Run tests for the data package only.
    packageFilters:
      scope: "data"

  test:geofencing:
    exec: flutter test --coverage
    description: Run tests for the geofencing package only.
    packageFilters:
      scope: "geofencing"

  # ── Coverage ────────────────────────────────────────────────────────────────

  coverage:combine:
    run: |
      dart pub global run coverage:format_coverage \
        --lcov \
        --in=coverage \
        --out=coverage/lcov.info \
        --report-on=lib
    description: Combine lcov reports from all packages.

  # ── Build ───────────────────────────────────────────────────────────────────

  build:ios:
    run: |
      cd apps/mobile && \
      flutter build ipa --no-codesign
    description: Build iOS archive (no code signing — for CI validation).

  build:android:
    run: |
      cd apps/mobile && \
      flutter build appbundle --release
    description: Build Android App Bundle.

  # ── Code generation ─────────────────────────────────────────────────────────

  gen:
    exec: dart run build_runner build --delete-conflicting-outputs
    description: Run build_runner code generation across all packages.
    packageFilters:
      dependsOn: "build_runner"

  gen:watch:
    exec: dart run build_runner watch --delete-conflicting-outputs
    description: Watch and regenerate code across all packages.
    packageFilters:
      dependsOn: "build_runner"

  # ── Utilities ────────────────────────────────────────────────────────────────

  clean:
    exec: flutter clean
    description: flutter clean across all packages.

  outdated:
    exec: flutter pub outdated
    description: Check for outdated dependencies.

  upgrade:
    exec: flutter pub upgrade
    description: Upgrade all dependencies.
